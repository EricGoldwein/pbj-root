<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Corrections | PBJ320</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Submit a correction for PBJ320 nursing home staffing or facility data for review.">
  <link rel="canonical" href="https://www.pbj320.com/corrections">
  <link rel="icon" type="image/png" href="/pbj_favicon.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      line-height: 1.6;
      min-height: 100vh;
    }
    .navbar {
      background: rgba(10, 15, 26, 0.92);
      padding: 0;
      position: sticky;
      top: 0;
      z-index: 1000;
      box-shadow: inset 0 -1px 0 rgba(255, 255, 255, 0.08);
      border-bottom: 1px solid rgba(148, 163, 184, 0.28);
    }
    .nav-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      height: 60px;
    }
    .nav-brand {
      display: flex;
      align-items: center;
      color: #eef2f7;
      font-size: 1.2rem;
      font-weight: 700;
      line-height: 1.2;
      min-width: 0;
    }
    .nav-brand a { color: inherit; text-decoration: none; display: flex; align-items: center; }
    .nav-brand img { width: 32px; height: 32px; margin-right: 8px; object-fit: contain; flex-shrink: 0; }
    .nav-brand span span:first-child { color: #e2e8f0; }
    .nav-brand span span:last-child { color: #818cf8; }
    .nav-menu { display: flex; gap: 30px; align-items: center; }
    .nav-link { color: #e2e8f0; text-decoration: none; font-weight: 500; padding: 8px 0; }
    .nav-link:hover { color: #818cf8; }
    .nav-toggle { display: none; flex-direction: column; cursor: pointer; gap: 4px; }
    .nav-toggle span { width: 25px; height: 3px; background: white; }
    .content { padding: 48px 20px; max-width: 560px; margin: 0 auto; }
    .content-box {
      background: #1e293b;
      border-radius: 12px;
      padding: 2rem;
      border: 1px solid rgba(96,165,250,0.25);
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }
    .content-box h1 { font-size: 1.5rem; color: #60a5fa; margin-bottom: 0.5rem; }
    .content-box > p { color: rgba(226,232,240,0.85); margin-bottom: 1.25rem; font-size: 0.95rem; }
    .form-group { margin-bottom: 1.25rem; }
    .form-group label { display: block; font-weight: 500; color: #cbd5e1; margin-bottom: 0.35rem; font-size: 0.9rem; }
    .form-group input[type="text"],
    .form-group input[type="email"],
    .form-group input[type="url"],
    .form-group textarea {
      width: 100%;
      padding: 0.65rem 0.75rem;
      border: 1px solid rgba(96,165,250,0.35);
      border-radius: 8px;
      font: inherit;
      font-size: 1rem;
      min-height: 44px;
      background: rgba(15,23,42,0.6);
      color: #e2e8f0;
    }
    .form-group textarea { min-height: 120px; resize: vertical; padding-top: 0.65rem; }
    .form-group input::placeholder, .form-group textarea::placeholder { color: rgba(148,163,184,0.7); }
    .form-group input:focus, .form-group textarea:focus {
      outline: none;
      border-color: #60a5fa;
      box-shadow: 0 0 0 2px rgba(96,165,250,0.2);
    }
    .form-group input:-webkit-autofill,
    .form-group input:-webkit-autofill:hover,
    .form-group input:-webkit-autofill:focus,
    .form-group input:-webkit-autofill:active,
    .form-group textarea:-webkit-autofill,
    .form-group textarea:-webkit-autofill:hover,
    .form-group textarea:-webkit-autofill:focus,
    .form-group textarea:-webkit-autofill:active {
      -webkit-text-fill-color: #e2e8f0;
      -webkit-box-shadow: 0 0 0 1000px rgba(15,23,42,0.95) inset;
      box-shadow: 0 0 0 1000px rgba(15,23,42,0.95) inset;
      transition: background-color 5000s ease-in-out 0s;
    }
    .form-group .optional { font-weight: 400; color: rgba(148,163,184,0.9); font-size: 0.85rem; }
    button[type="submit"] {
      background: rgba(96,165,250,0.2);
      color: #93c5fd;
      border: 1px solid rgba(96,165,250,0.5);
      padding: 0.75rem 1.5rem;
      border-radius: 8px;
      font: inherit;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      min-height: 44px;
      width: 100%;
    }
    button[type="submit"]:hover { background: rgba(96,165,250,0.3); color: #bfdbfe; border-color: rgba(96,165,250,0.6); }
    button[type="submit"]:focus-visible { outline: 2px solid #1e40af; outline-offset: 2px; }
    .message { padding: 0.75rem 1rem; border-radius: 8px; margin-bottom: 1.25rem; }
    .message.success { background: rgba(30, 41, 59, 0.6); color: #e2e8f0; border: 1px solid rgba(148, 163, 184, 0.25); border-radius: 12px; }
    .message.error { background: rgba(239,68,68,0.15); color: #fca5a5; border: 1px solid rgba(239,68,68,0.3); }
    @media (max-width: 768px) {
      .content { padding: 24px 16px; }
      .content-box { padding: 1.5rem; }
      .nav-menu { display: none; flex-direction: column; position: absolute; top: 60px; left: 0; right: 0; background: #0f172a; padding: 1rem; }
      .nav-menu.active { display: flex; }
      .nav-toggle { display: flex; min-width: 44px; min-height: 44px; align-items: center; justify-content: center; }
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <div class="nav-brand">
        <a href="/">
          <img src="/pbj_favicon.png" alt="PBJ320" style="height: 32px; margin-right: 8px;">
          <span><span style="color: white;">PBJ</span><span style="color: #60a5fa;">320</span></span>
        </a>
      </div>
      <div class="nav-menu" id="navMenu">
        <a href="/about" class="nav-link">About</a>
        <a href="/report" class="nav-link">Report</a>
        <a href="/insights" class="nav-link">Insights</a>
        <a href="/phoebe" class="nav-link">PBJ Explained</a>
        <a href="/premium" class="nav-link">Premium</a>
      </div>
      <div class="nav-toggle" id="navToggle" aria-label="Menu"><span></span><span></span><span></span></div>
    </div>
  </nav>

  <main class="content">
    <div class="content-box">
      <h1>Corrections</h1>
      <p>See something wrong on PBJ320? Tell us what to fix.</p>

      <div id="corrections-success" class="message success" role="status" style="display: none;">Correction submitted. Thank you.</div>
      <div id="corrections-error" class="message error" role="alert" style="display: none;">Something went wrong. Please try again.</div>

      <form action="/corrections" method="POST" id="corrections-form">
        <input type="hidden" name="csrf_token" value="__CSRF_TOKEN_PLACEHOLDER__">
        <input type="hidden" name="next" value="/corrections">
        <div class="form-group">
          <label for="corrections-name">Name <span style="color: #f87171;">*</span></label>
          <input type="text" id="corrections-name" name="name" required autocomplete="name" maxlength="200" aria-required="true">
        </div>
        <div class="form-group">
          <label for="corrections-email">Email <span style="color: #f87171;">*</span></label>
          <input type="email" id="corrections-email" name="email" required autocomplete="email" aria-required="true">
        </div>
        <input type="hidden" id="corrections-page-url" name="page_url" value="">
        <div class="form-group">
          <label for="corrections-issue">What's wrong? <span style="color: #f87171;">*</span></label>
          <textarea id="corrections-issue" name="issue" required aria-required="true" maxlength="10000" placeholder="Describe the error. Include a source or link if you have one."></textarea>
        </div>
        <button type="submit">Submit correction</button>
      </form>
      <noscript>
        <p style="margin-top:1rem;font-size:0.9rem;color:rgba(148,163,184,0.95);">
          <a href="mailto:egoldwein@gmail.com?subject=PBJ320%20Correction">Email a correction</a> if the form does not load.
        </p>
      </noscript>
    </div>
  </main>

  <footer class="footer" id="site-footer" style="padding: 1.25rem 1rem;"></footer>

  <script src="/pbj-site-universal.js?v=32"></script>
  <script>
    (function() {
      var params = new URLSearchParams(window.location.search);
      var successEl = document.getElementById('corrections-success');
      var errorEl = document.getElementById('corrections-error');
      var formEl = document.getElementById('corrections-form');
      if ((params.get('correction_sent') === '1' || params.get('sent') === '1') && successEl) {
        successEl.style.display = 'block';
        if (formEl) formEl.style.display = 'none';
      }
      if ((params.get('correction_error') === '1' || params.get('error')) && errorEl) {
        errorEl.style.display = 'block';
      }
      var pageUrlInput = document.getElementById('corrections-page-url');
      if (pageUrlInput) {
        if (params.get('page')) {
          try {
            pageUrlInput.value = decodeURIComponent(params.get('page'));
          } catch (e) {}
        } else if (!pageUrlInput.value && window.location.href) {
          pageUrlInput.value = window.location.href.split('#')[0];
        }
      }
      var t = document.getElementById('navToggle');
      var m = document.getElementById('navMenu');
      if (t && m) t.addEventListener('click', function() { m.classList.toggle('active'); t.classList.toggle('active'); });
    })();
  </script>
</body>
</html>
