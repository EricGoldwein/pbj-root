  <script>
    (function() {
      var listEl = document.getElementById('newsletter-list');
      var loadingEl = document.getElementById('newsletter-loading');
      var errorEl = document.getElementById('newsletter-error');

      function formatDate(raw) {
        if (!raw) return '';
        try {
          var d = new Date(raw);
          if (isNaN(d.getTime())) return raw;
          return d.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
        } catch (e) { return raw; }
      }

      fetch('/api/newsletter')
        .then(function(r) { return r.ok ? r.json() : Promise.reject(new Error('Feed unavailable')); })
        .then(function(data) {
          loadingEl.style.display = 'none';
          var posts = (data && data.posts) ? data.posts : [];
          if (posts.length === 0) {
            listEl.innerHTML = '<li><p class="post-desc">No posts yet. New nursing home articles from The 320 will appear here.</p></li>';
          } else {
            listEl.innerHTML = posts.map(function(p) {
              var title = (p.title || '').replace(/</g, '&lt;').replace(/>/g, '&gt;');
              var url = (p.url || '#').replace(/"/g, '&quot;');
              var desc = (p.description || '').replace(/</g, '&lt;').replace(/>/g, '&gt;');
              var dateStr = formatDate(p.date || p.sort_date);
              var badge = p.source === 'manual' ? '<span class="post-badge">Added by PBJ320</span>' : '';
              var imgHtml = '';
              if (p.image_url) {
                var imgUrl = (p.image_url || '').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
                var imgAlt = (p.title || 'Article').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                imgHtml = '<a href="' + url + '" target="_blank" rel="noopener" class="post-featured-img"><img src="' + imgUrl + '" alt="Preview: ' + imgAlt + '" loading="lazy"></a>';
              }
              return '<li class="post-card">' +
                '<div class="post-body">' +
                '<a href="' + url + '" class="post-title" target="_blank" rel="noopener">' + title + badge + '</a>' +
                '<p class="post-meta">' + dateStr + '</p>' +
                '</div>' +
                imgHtml +
                '<div class="post-body">' +
                (desc ? '<p class="post-desc">' + desc + '</p>' : '') +
                '<p class="post-link-wrap"><a href="' + url + '" class="post-link-substack" target="_blank" rel="noopener">' + (p.source === 'manual' ? 'Read article' : 'Read on The 320') + '</a></p>' +
                '</div></li>';
            }).join('');
            var embedBottom = document.getElementById('substack-embed-bottom');
            if (embedBottom) embedBottom.style.display = 'block';
          }
          listEl.style.display = 'block';
        })
        .catch(function(err) {
          loadingEl.style.display = 'none';
          errorEl.textContent = 'Could not load newsletter feed. Try again later.';
          errorEl.style.display = 'block';
        });
    })();
  </script>
