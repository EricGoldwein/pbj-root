# pbj-contract/formatting.yaml
# Rounding and display rules.
# Populated from pbj-root: PBJ_Playground.py, report.html, insights.html, pbj-sample, pbj-wrapped.
# PBJapp alignment not verified.

# ------------------------------------------------------------------------------
# Rounding
# ------------------------------------------------------------------------------
rounding:
  method: "ROUND_HALF_UP"
  # Python: Decimal.quantize; JS: toFixed uses banker's rounding—potential drift.
  source: "PBJ_Playground.py"

# ------------------------------------------------------------------------------
# Decimal places by metric type
# ------------------------------------------------------------------------------
decimals:
  hprd: 2
  # Total_Nurse_HPRD, Total_RN_HPRD, Nurse_Assistant_HPRD, Direct HPRD
  source: "PBJ_Playground.py format_metric, report.html toFixed(2), insights, pbj-wrapped"

  percentage: 1
  # Contract_Percentage, forProfitPercent, etc.
  source: "PBJ_Playground.py percentage=True, report.html toFixed(1)"

  census: 0
  # avg_daily_census: integer or toLocaleString
  source: "report.html Math.round(value).toLocaleString()"

# ------------------------------------------------------------------------------
# Percentage suffix
# ------------------------------------------------------------------------------
percentage:
  suffix: "%"
  decimals: 1
  source: "report.html formatted + '%'"

# ------------------------------------------------------------------------------
# Color thresholds (report.html getValueColor)
# Used for map/table cell coloring. HPRD: higher is better (green); Contract %: lower is better.
# ------------------------------------------------------------------------------
color_thresholds:
  hprd_high_good:
    # Green to red as value decreases
    green: 4.5   # >= 4.5
    light_green: 4.0  # >= 4.0
    yellow: 3.5  # >= 3.5
    light_red: 3.0    # >= 3.0
    red: 0      # < 3.0
  contract_percent_low_good:
    # Red to green as value decreases (Contract %: lower is better)
    green: 1    # < 1
    yellow: 3   # < 3
    light_red: 5  # < 5
    red: 99     # >= 5
  source: "report.html getValueColor"
  # Drift risk: thresholds hardcoded in multiple report paths.

# ------------------------------------------------------------------------------
# Naming conventions in outputs
# ------------------------------------------------------------------------------
naming:
  # HPRD abbreviation used consistently
  hprd_suffix: " HPRD"
  # "Nurse Aide" vs "Nurse Assistant"—report uses "Nurse Aide" in display
  nurse_aide_label: "Nurse Aide"
  contract_staff_label: "Contract Staff"
