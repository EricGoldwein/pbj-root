# pbj-contract/quarter_rules.yaml
# CMS quarter alignment, lag assumptions, date-based conditionals.
# Populated from pbj-root: PBJPedia, pbj-sample, extract_latest_quarter, utils/date_utils.
# PBJapp alignment not verified.

# ------------------------------------------------------------------------------
# CMS reporting lag
# ------------------------------------------------------------------------------
reporting_deadline:
  days_after_quarter_end: 45
  description: "Facilities must submit PBJ data within 45 days after quarter end."
  source: "PBJPedia methodology"

# ------------------------------------------------------------------------------
# Quarter format mapping
# ------------------------------------------------------------------------------
quarter_formats:
  state_format: "2025Q2"
  # Used in: state_quarterly_metrics, facility_quarterly_metrics, CY_Qtr column
  provider_format: "Q2 2025"
  # Used in: provider_info_combined quarter column
  conversion:
    state_to_provider: "2025Q2 -> Q2 2025"
    provider_to_state: "Q2 2025 -> 2025Q2"
  source: "extract_latest_quarter.py convert_provider_to_state"

# ------------------------------------------------------------------------------
# CMS URL column case: provnum vs PROVNUM
# Early quarters used lowercase 'provnum'; later quarters use 'PROVNUM'.
# ------------------------------------------------------------------------------
cms_column_case:
  early_quarters_use_provnum: true
  early_quarters:
    - "2017Q1"
    - "2017Q2"
    - "2017Q3"
    - "2017Q4"
    - "2018Q4"
    - "2019Q1"
    - "2019Q2"
    - "2019Q3"
    - "2019Q4"
    - "2020Q2"
    - "2020Q3"
  # For early quarters: column name "provnum"; otherwise "PROVNUM"
  source: "pbj-sample.html earlyQuarters"
  # Drift risk: hardcoded list; CMS schema changes could invalidate.

# ------------------------------------------------------------------------------
# Calendar quarter boundaries
# ------------------------------------------------------------------------------
calendar_quarters:
  Q1: "Jan 1 - Mar 31"
  Q2: "Apr 1 - Jun 30"
  Q3: "Jul 1 - Sep 30"
  Q4: "Oct 1 - Dec 31"
  source: "PBJPedia methodology"

# ------------------------------------------------------------------------------
# Data availability (operational fallbacks in date_utils, app.py)
# ------------------------------------------------------------------------------
fallbacks:
  # Used when CSV/JSON unavailable
  provider_info_latest: "September 2025"
  provider_info_previous: "June 2025"
  affiliated_entity_latest: "July 2025"
  pbj_quarter_display: "Q3 2025"
  sff_posting: "Dec. 2025"
  source: "utils/date_utils.py, app.py api_dates"
  # TODO in date_utils: Move to config file if needed
