# Render: must bind 0.0.0.0:10000 so port scan and /health work. Procfile must match.
services:
  - type: web
    name: pbj
    runtime: python
    # Skip LFS smudge on clone (saves LFS bandwidth). Real CSVs: scripts/ensure_deploy_csvs.py
    buildCommand: export GIT_LFS_SKIP_SMUDGE=1 && python scripts/ensure_deploy_csvs.py && pip install -r requirements.txt && python scripts/build_snf_owners_index.py && cd pbj-wrapped && npm install && npm run build
    startCommand: gunicorn app:app -c gunicorn_config.py --bind 0.0.0.0:10000
    healthCheckPath: /health
    envVars:
      - key: GIT_LFS_SKIP_SMUDGE
        value: "1"
      - key: PORT
        value: "10000"
      # Connecticut facility pages only — not /pbj-ai-support, not other states
      - key: PBJ_AI_SUPPORT
        value: "dashboards"