# Render: must bind 0.0.0.0:10000 so port scan and /health work. Procfile must match.
services:
  - type: web
    name: pbj
    runtime: python
    # Skip LFS smudge on clone (saves LFS bandwidth). Real CSVs: scripts/ensure_deploy_csvs.py
    buildCommand: python scripts/ensure_deploy_csvs.py && python scripts/build_facility_provider_indexes.py && python scripts/validate_provider_index_schema.py && pip install -r requirements.txt && cd pbj-wrapped && npm install && npm run build
    # CSV materialization runs at build; skip 520k-row verify on every restart (RUN_DEPLOY_CSV_CHECK=1 to enable).
    startCommand: gunicorn app:app -c gunicorn_config.py --bind 0.0.0.0:10000
    healthCheckPath: /health
    envVars:
      - key: GIT_LFS_SKIP_SMUDGE
        value: "1"
      - key: PORT
        value: "10000"
      # CT + NY facility pages only — not /pbj-ai-support, not other states
      - key: PBJ_AI_SUPPORT
        value: "dashboards"