# Render: must bind 0.0.0.0:10000 so port scan and /health work. Procfile must match.
services:
  - type: web
    name: pbj
    runtime: python
    # Skip LFS smudge on clone (saves LFS bandwidth). Real CSVs: scripts/ensure_deploy_csvs.py
    buildCommand: pip install -r requirements.txt && PBJ_SKIP_BUILD_PROVIDER_INDEXES=1 python scripts/ensure_deploy_csvs.py --quick && python scripts/build_state_page_aggregates.py && python scripts/build_facility_provider_indexes.py && python scripts/validate_provider_index_schema.py && python scripts/build_snf_owners_index.py && python scripts/build_snf_owners_ccn_index.py && python scripts/validate_ownership_linkage.py && python scripts/build_owners_database.py && cd pbj-wrapped && npm install && npm run build
    # CSV/index work runs in buildCommand only. Start must bind :10000 quickly for /health (see scripts/render_start.py).
    startCommand: python scripts/render_start.py
    healthCheckPath: /health
    envVars:
      - key: GIT_LFS_SKIP_SMUDGE
        value: "1"
      - key: PORT
        value: "10000"
      # Build already ran ensure_deploy_csvs; do not block Gunicorn on restart (Dashboard must not prepend ensure_deploy).
      - key: PBJ_SKIP_START_CSV_ENSURE
        value: "1"
      # Crawler / cold-render guards (override in Dashboard if needed)
      - key: PBJ_AI_CRAWLER_RATE_LIMIT
        value: "4"
      - key: PBJ_AI_PROVIDER_CACHE_ONLY
        value: "1"
      - key: PBJ_SEARCH_BOT_PROVIDER_CACHE_ONLY
        value: "1"
      - key: PBJ_PROVIDER_COLD_BURST_LIMIT
        value: "4"
      - key: PBJ_PROVIDER_CRAWLER_COLD_LIMIT
        value: "4"
      - key: PBJ_OTHER_BOT_RATE_LIMIT
        value: "20"
      - key: PBJ_SITEMAP_CACHE_TTL
        value: "3600"
      # Leave PBJ_GUNICORN_MAX_REQUESTS unset (0) — worker recycle with 1 worker drops /health.
      # CT + NY facility pages only — not /pbj-ai-support, not other states
      - key: PBJ_AI_SUPPORT
        value: "dashboards"
      - key: PBJ_SKIP_BUILD_PROVIDER_INDEXES
        value: "1"