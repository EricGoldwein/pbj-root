<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>Premium Dashboard — CCN {{ ccn }}</title>
  <link rel="icon" type="image/png" href="/pbj_favicon.png">
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(160deg, #0f172a 0%, #1e293b 50%, #312e81 100%);
      color: #e2e8f0; padding: 1.5rem;
    }
    .card {
      width: 100%; max-width: 400px; background: rgba(15, 23, 42, 0.92);
      border: 1px solid rgba(129, 140, 248, 0.35); border-radius: 14px;
      padding: 1.75rem 1.5rem; box-shadow: 0 20px 50px rgba(0,0,0,0.45);
    }
    h1 { font-size: 1.15rem; margin: 0 0 0.35rem; color: #fff; }
    .sub { font-size: 0.85rem; color: #94a3b8; margin: 0 0 1.25rem; }
    label { display: block; font-size: 0.8rem; font-weight: 600; margin-bottom: 0.35rem; color: #cbd5e1; }
    input[type=password] {
      width: 100%; padding: 0.65rem 0.75rem; border-radius: 8px; border: 1px solid #475569;
      background: #0f172a; color: #f8fafc; font-size: 1rem; margin-bottom: 1rem;
    }
    button {
      width: 100%; padding: 0.7rem; border: none; border-radius: 8px; font-weight: 700;
      font-size: 0.95rem; cursor: pointer; color: #fff;
      background: linear-gradient(135deg, #6366f1, #4f46e5);
    }
    button:hover { filter: brightness(1.08); }
    .err { background: rgba(239,68,68,0.15); border: 1px solid #f87171; color: #fecaca;
      padding: 0.55rem 0.65rem; border-radius: 8px; font-size: 0.82rem; margin-bottom: 1rem; }
    .brand { font-size: 0.75rem; color: #64748b; margin-top: 1.25rem; text-align: center; }
    .brand a { color: #818cf8; text-decoration: none; }
  </style>
</head>
<body>
  <div class="card">
    <h1>PBJ320 Premium</h1>
    <p class="sub">{{ facility_name }}<br>CCN {{ ccn }}</p>
    {% if error %}<div class="err">{{ error }}</div>{% endif %}
    <form method="post" action="">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" autocomplete="current-password" required autofocus>
      <button type="submit">Enter dashboard</button>
    </form>
    <p class="brand">Operated by <a href="https://www.pbj320.com/premium">320 Consulting</a></p>
  </div>
</body>
</html>
